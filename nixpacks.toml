# Node 24 matches CI and satisfies Prisma's preinstall (requires >= 22.12 / 24).
# nodejs_22 resolved to 22.11.0 on Railway, which Prisma rejects.
[phases.setup]
nixPkgs = ["nodejs_24", "openssl"]

# --include=dev is required: NODE_ENV=production (a runtime var) otherwise makes
# npm omit devDependencies, but the build needs them (prisma CLI, Nx, webpack…).
[phases.install]
cmds = ["npm ci --legacy-peer-deps --include=dev"]

# Migrations run at deploy time (railway.json preDeployCommand), not here — the
# build must not depend on the database being reachable.
# NX_DAEMON=false: the Nx daemon hangs in Railway's build container ("NX [object
# Object]"); CI works because the daemon is disabled there. Match that here.
[phases.build]
cmds = [
  "npx prisma generate",
  "NX_DAEMON=false NODE_OPTIONS=--max-old-space-size=2048 npx nx build learning-app --configuration=production",
  "NX_DAEMON=false npx nx build api"
]

[start]
cmd = "node dist/apps/api/main.js"
