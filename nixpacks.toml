# Node 24 matches CI and satisfies Prisma's preinstall (requires >= 22.12 / 24).
# nodejs_22 resolved to 22.11.0 on Railway, which Prisma rejects.
[phases.setup]
nixPkgs = ["nodejs_24", "openssl"]

[phases.install]
cmds = ["npm ci --legacy-peer-deps"]

# Migrations run at deploy time (railway.json preDeployCommand), not here — the
# build must not depend on the database being reachable.
[phases.build]
cmds = [
  "npx prisma generate",
  "NODE_OPTIONS=--max-old-space-size=2048 npx nx build learning-app --configuration=production",
  "npx nx build api --configuration=production"
]

[start]
cmd = "node dist/apps/api/main.js"
