<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 200" width="260" height="200" role="img" aria-label="Anatomía de una carta del juego: tres secciones">
  <title>Anatomía de una carta de juego</title>
  <desc>Diagrama mostrando las tres secciones de una carta: desembarco (arriba), evento (centro) y fuego alemán (abajo).</desc>

  <!-- Card background -->
  <rect x="30" y="10" width="180" height="170" rx="8" ry="8" fill="#f5f0e8" stroke="#8b7355" stroke-width="2"/>

  <!-- Card number -->
  <text x="45" y="30" font-family="serif" font-size="11" fill="#8b7355">Carta #17</text>

  <!-- Section 1: Landing Results -->
  <rect x="35" y="35" width="170" height="45" rx="2" fill="#d4e8f0" stroke="#5a9ab5" stroke-width="1"/>
  <text x="120" y="50" text-anchor="middle" font-family="sans-serif" font-size="9" font-weight="bold" fill="#2c5f7a">RESULTADOS DE DESEMBARCO</text>
  <!-- Target symbols and results -->
  <text x="60" y="67" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#333">●B</text>
  <text x="120" y="67" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#333">◆A</text>
  <text x="180" y="67" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#333">▲D</text>

  <!-- Section 2: Event -->
  <rect x="35" y="83" width="170" height="45" rx="2" fill="#f0ead4" stroke="#b59a40" stroke-width="1"/>
  <text x="120" y="97" text-anchor="middle" font-family="sans-serif" font-size="9" font-weight="bold" fill="#7a5c10">EVENTO</text>
  <text x="120" y="113" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#555">Turno 5–8: Fuego naval</text>

  <!-- Section 3: German Fire -->
  <rect x="35" y="131" width="170" height="45" rx="2" fill="#f0d4d4" stroke="#b54040" stroke-width="1"/>
  <text x="120" y="145" text-anchor="middle" font-family="sans-serif" font-size="9" font-weight="bold" fill="#7a1010">FUEGO ALEMÁN</text>
  <!-- Color symbols: red (single), blue (double), green (single with star) -->
  <circle cx="70" cy="160" r="8" fill="#cc3333"/>
  <text x="70" y="164" text-anchor="middle" font-family="sans-serif" font-size="9" fill="white">●</text>
  <rect x="100" y="152" width="12" height="12" rx="1" fill="#3355cc"/>
  <rect x="104" y="156" width="12" height="12" rx="1" fill="#3355cc" stroke="white" stroke-width="0.5"/>
  <circle cx="155" cy="160" r="8" fill="#33aa33"/>
  <text x="155" y="156" text-anchor="middle" font-family="sans-serif" font-size="9" fill="white">★</text>
  <text x="155" y="164" text-anchor="middle" font-family="sans-serif" font-size="9" fill="white">▲</text>

  <!-- Section labels on the right -->
  <text x="215" y="58" font-family="sans-serif" font-size="9" fill="#2c5f7a">↑ Desembarco</text>
  <text x="215" y="106" font-family="sans-serif" font-size="9" fill="#7a5c10">↑ Evento</text>
  <text x="215" y="154" font-family="sans-serif" font-size="9" fill="#7a1010">↑ Fuego</text>
</svg>
