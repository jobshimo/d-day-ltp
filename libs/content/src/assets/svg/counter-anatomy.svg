<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 180" width="240" height="180" role="img" aria-label="Anatomía de una ficha de infantería de EE.UU.">
  <title>Anatomía de ficha de infantería de EE.UU.</title>
  <desc>Diagrama de los elementos clave de una ficha de infantería estadounidense: fuerza de ataque, escalones, símbolo de objetivo y armas.</desc>

  <!-- Counter background -->
  <rect x="60" y="20" width="120" height="100" rx="4" ry="4" fill="#4a7c59" stroke="#2c4a35" stroke-width="2"/>

  <!-- Unit type symbol (infantry crossed rifles) -->
  <line x1="100" y1="50" x2="140" y2="70" stroke="white" stroke-width="2.5"/>
  <line x1="140" y1="50" x2="100" y2="70" stroke="white" stroke-width="2.5"/>

  <!-- Attack strength (front) -->
  <text x="72" y="105" font-family="sans-serif" font-size="18" font-weight="bold" fill="white">3</text>
  <!-- Reduced strength -->
  <text x="147" y="105" font-family="sans-serif" font-size="12" fill="white" opacity="0.7">2</text>

  <!-- Target symbol (black circle = can control adjacent hexes) -->
  <circle cx="120" cy="38" r="8" fill="black" stroke="white" stroke-width="1"/>
  <text x="120" y="43" text-anchor="middle" font-family="sans-serif" font-size="10" fill="white">●</text>

  <!-- Steps indicator -->
  <rect x="168" y="22" width="10" height="8" rx="1" fill="#6daa7a"/>
  <rect x="168" y="32" width="10" height="8" rx="1" fill="#6daa7a"/>
  <rect x="168" y="42" width="10" height="8" rx="1" fill="#6daa7a"/>

  <!-- Annotation arrows and labels -->
  <!-- Attack strength label -->
  <line x1="72" y1="108" x2="50" y2="130" stroke="#333" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="5" y="143" font-family="sans-serif" font-size="10" fill="#333">Fuerza de</text>
  <text x="5" y="155" font-family="sans-serif" font-size="10" fill="#333">ataque</text>

  <!-- Target symbol label -->
  <line x1="120" y1="30" x2="120" y2="10" stroke="#333" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="85" y="10" font-family="sans-serif" font-size="10" fill="#333">Símbolo de objetivo</text>

  <!-- Steps label -->
  <line x1="178" y1="38" x2="210" y2="38" stroke="#333" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="213" y="35" font-family="sans-serif" font-size="10" fill="#333">Escalones</text>
  <text x="213" y="47" font-family="sans-serif" font-size="10" fill="#333">(3)</text>
</svg>
